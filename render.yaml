services:
  - type: web
    name: vigility-backend
    env: node
    rootDir: backend
    buildCommand: npm install && npx prisma generate && npx prisma migrate deploy
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: JWT_SECRET
        value: vigility_super_secret_jwt_key_2024
      - key: FRONTEND_URL
        value: https://placeholder.netlify.app
      - key: DATABASE_URL
        fromDatabase:
          name: vigility-db
          property: connectionString

databases:
  - name: vigility-db
    plan: free